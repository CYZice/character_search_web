version: "3.8"

name: character_search

services:
  character_search:
    image: ${IMAGE_NAME:-character_search:latest}
    container_name: character_search
    restart: unless-stopped
    working_dir: /app
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/characters.db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "35827:8001"
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
