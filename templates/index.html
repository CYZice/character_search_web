<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字字形检索系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --paper-white: #F5F0E6;
            --paper-old: #E8DFD0;
            --paper-dark: #D4C4A8;
            --ink-black: #2C2C2C;
            --ink-gray: #4A4A4A;
            --vermilion: #C73E3A;
            --vermilion-dark: #A62E2A;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--paper-white);
            font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
            color: var(--ink-black);
            min-height: 100vh;
        }

        [v-cloak] {
            display: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--ink-black);
            margin-bottom: 0.5rem;
            letter-spacing: 0.2em;
        }

        .header p {
            color: var(--ink-gray);
            font-size: 0.9rem;
        }

        .brush-divider {
            height: 2px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    var(--ink-gray) 20%,
                    var(--vermilion) 50%,
                    var(--ink-gray) 80%,
                    transparent 100%);
            opacity: 0.4;
            margin: 1.5rem auto;
            max-width: 400px;
        }

        .search-box {
            max-width: 500px;
            margin: 0 auto 3rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 3.5rem 1rem 1.5rem;
            font-size: 1.5rem;
            font-family: 'Noto Serif SC', serif;
            border: 2px solid var(--paper-dark);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--ink-black);
            text-align: center;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--vermilion);
            background: white;
            box-shadow: 0 0 0 3px rgba(199, 62, 58, 0.1);
        }

        .search-input::placeholder {
            color: var(--ink-gray);
            opacity: 0.5;
        }

        .search-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: var(--vermilion);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .search-btn:hover {
            background: var(--vermilion-dark);
        }

        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .results-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .results-header h2 {
            font-size: 1.5rem;
            color: var(--ink-black);
        }

        .results-header .char-display {
            font-size: 3rem;
            color: var(--vermilion);
            margin: 0.5rem 0;
        }

        .results-header .count {
            color: var(--ink-gray);
            font-size: 0.9rem;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .image-card {
            background: white;
            border: 1px solid var(--paper-dark);
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: var(--paper-old);
            display: block;
        }

        .image-card .caption {
            padding: 0.75rem;
            font-size: 0.85rem;
            color: var(--ink-gray);
            text-align: center;
            border-top: 1px solid var(--paper-dark);
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--ink-gray);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
        }

        .seal-loader {
            width: 48px;
            height: 48px;
            border: 3px solid var(--paper-dark);
            border-top-color: var(--vermilion);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            text-align: center;
            padding: 2rem;
            color: var(--vermilion);
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--ink-gray);
            font-size: 0.8rem;
            border-top: 1px solid var(--paper-dark);
            margin-top: 3rem;
        }
    </style>
</head>

<body>
    {% raw %}
    <div id="app" v-cloak>
        <div class="container">
            <!-- 头部 -->
            <div class="header">
                <h1>汉字字形检索系统</h1>
                <p>辽代汉文石刻文字研究</p>
            </div>

            <div class="brush-divider"></div>

            <!-- 搜索框 -->
            <div class="search-box">
                <input
                    v-model="searchQuery"
                    @keyup.enter="performSearch"
                    type="text"
                    class="search-input"
                    placeholder="输入汉字..."
                    maxlength="1"
                    autofocus
                >
                <button @click="performSearch" class="search-btn" :disabled="loading || !searchQuery">
                    <span v-if="loading">检索中...</span>
                    <span v-else>检索</span>
                </button>
            </div>

            <!-- 加载状态 -->
            <div v-if="loading" class="loading">
                <div class="seal-loader"></div>
                <p>正在检索...</p>
            </div>

            <!-- 错误状态 -->
            <div v-else-if="errorMsg" class="error-msg">
                <p>{{ errorMsg }}</p>
            </div>

            <!-- 结果 -->
            <div v-else-if="results">
                <div class="results-header">
                    <h2>检索结果</h2>
                    <div class="char-display">【{{ results.character }}】</div>
                    <div class="count">共 {{ results.total_images }} 张图片</div>
                </div>

                <div v-if="results.total_images > 0" class="image-grid">
                    <div v-for="img in results.images" :key="img.id" class="image-card">
                        <img :src="img.image_url" :alt="img.source_text" loading="lazy">
                        <div class="caption">{{ img.source_text || '无出处' }}</div>
                    </div>
                </div>

                <div v-else class="empty-state">
                    <div class="icon">□</div>
                    <p>暂无图片</p>
                </div>
            </div>

            <!-- 空状态 -->
            <div v-else class="empty-state">
                <div class="icon">字</div>
                <p>请输入汉字进行检索</p>
            </div>

            <!-- 底部 -->
            <div class="footer">
                <p>辽代汉文石刻文字研究 · 汉字字形检索</p>
            </div>
        </div>
    </div>
    {% endraw %}

    <script>
        const { createApp, ref } = Vue

        createApp({
            setup() {
                const searchQuery = ref('')
                const results = ref(null)
                const loading = ref(false)
                const errorMsg = ref(null)

                const performSearch = async () => {
                    if (!searchQuery.value || loading.value) return

                    const char = searchQuery.value.trim()
                    if (!char) return

                    loading.value = true
                    errorMsg.value = null
                    results.value = null

                    try {
                        const response = await fetch(`/api/characters/${encodeURIComponent(char)}`)
                        if (response.status === 404) {
                            const data = await response.json()
                            errorMsg.value = data.detail || '未找到该汉字'
                        } else if (!response.ok) {
                            errorMsg.value = '检索失败，请稍后重试'
                        } else {
                            results.value = await response.json()
                        }
                    } catch (e) {
                        errorMsg.value = '网络错误，请检查连接'
                    } finally {
                        loading.value = false
                    }
                }

                return {
                    searchQuery,
                    results,
                    loading,
                    errorMsg,
                    performSearch
                }
            }
        }).mount('#app')
    </script>
</body>

</html>
